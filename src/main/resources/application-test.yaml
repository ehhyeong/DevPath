spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:devpath;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never
      schema-locations: classpath:h2-compat.sql

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client
            client-secret: test-github-secret
          google:
            client-id: test-google-client
            client-secret: test-google-secret

  data:
    redis:
      host: localhost
      port: 6379
      password:

app:
  oauth2:
    redirect-url: http://localhost:8084/oauth2/redirect
    allowed-origins: http://localhost:8084
  security:
    require-https: false
  cors:
    allowed-origins: http://localhost:8084

jwt:
  secret: c3ByaW5nLWJvb3QtZGV2cGF0aC1zZWNyZXQta2V5LXRlc3QtZ2VuZXJhdGUtMjAyNjAyMjQ=
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

ocr:
  allow-source-text-fallback: true

blog:
  publish:
    allow-mock-provider: true
